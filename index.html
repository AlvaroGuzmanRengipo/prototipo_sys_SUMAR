<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema SUMAR</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1e3a8a', // blue-900
                        primaryLight: '#3b82f6', // blue-500
                        secondary: '#475569', // slate-600
                        accent: '#0ea5e9', // sky-500
                        background: '#f8fafc', // slate-50
                        surface: '#ffffff',
                    }
                }
            }
        }
    </script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone@7.23.6/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-background text-secondary font-sans antialiased min-h-screen">
    <div id="root"></div>

    <script type="text/babel" data-presets="react">
        const { useState, useEffect, useMemo } = React;

        // --- ICON COMPONENT ---
        const Icon = ({ name, size = 20, className = "" }) => {
            const iconRef = React.useRef(null);
            useEffect(() => {
                if (iconRef.current) {
                    lucide.createIcons({
                        icons: { [name]: lucide.icons[name] },
                        nameAttr: 'data-lucide',
                        attrs: {
                            class: `lucide lucide-${name} ${className}`,
                            width: size,
                            height: size
                        }
                    });
                }
            }, [name, size, className]);
            return <i ref={iconRef} data-lucide={name}></i>;
        };

        // --- MOCK DATA ---
        const initialSolicitudes = [
            { id: 1, efector: 'Hospital Central', servicio: 'Terapia Intensiva', categoria: 'Bienes de capital', detalle: 'Monitores Multiparamétricos (x2)', monto: 2500000, estado: 'INICIADA', observaciones: '', estadoCompra: null, fecha: '2023-10-01' },
            { id: 2, efector: 'Hospital Central', servicio: 'Farmacia', categoria: 'Insumos', detalle: 'Antibióticos de amplio espectro', monto: 850000, estado: 'PRE_APROBADA', observaciones: 'Cotización adjunta revisada ok', estadoCompra: null, fecha: '2023-10-05' },
            { id: 3, efector: 'Hospital Central', servicio: 'Infraestructura', categoria: 'Servicios', detalle: 'Reparación de ascensor camillero', monto: 1200000, estado: 'APROBADO', observaciones: 'Aprobado prioritario', estadoCompra: 'INICIADA_COMPRA', fecha: '2023-10-10' },
            { id: 4, efector: 'Hospital Central', servicio: 'Pediatría', categoria: 'RRHH', detalle: 'Guardias extras septiembre', monto: 450000, estado: 'RECHAZADO', observaciones: 'Falta justificación de carga horaria', estadoCompra: null, fecha: '2023-10-12' },
            { id: 5, efector: 'Hospital Central', servicio: 'Diagnóstico por Imágenes', categoria: 'Bienes de capital', detalle: 'Tubo de Rayos X', monto: 3500000, estado: 'APROBADO', observaciones: '', estadoCompra: 'FINALIZADA', fecha: '2023-09-20' },
            { id: 6, efector: 'Hospital Norte', servicio: 'Laboratorio', categoria: 'Insumos', detalle: 'Reactivos PCR', monto: 600000, estado: 'DERIVADA', observaciones: 'Se requiere revisión de Legales', estadoCompra: null, fecha: '2023-10-15' },
            { id: 7, efector: 'Centro de Salud N°1', servicio: 'Odontología', categoria: 'Bienes de capital', detalle: 'Sillón Odontológico completo', monto: 1800000, estado: 'PRE_APROBADA', observaciones: 'Verificado plan de equipamiento 2023', estadoCompra: null, fecha: '2023-10-16' },
            { id: 8, efector: 'Hospital Sur', servicio: 'Guardia', categoria: 'Insumos', detalle: 'Kits de sutura y gasas', monto: 320000, estado: 'INICIADA', observaciones: '', estadoCompra: null, fecha: '2023-10-17' },
            { id: 9, efector: 'Hospital Central', servicio: 'Mantenimiento', categoria: 'Servicios', detalle: 'Mantenimiento preventivo grupo electrógeno', monto: 150000, estado: 'PRE_APROBADA', observaciones: 'Presupuesto dentro del límite mensual', estadoCompra: null, fecha: '2023-10-18' },
            { id: 10, efector: 'Centro de Salud N°5', servicio: 'Atención Primaria', categoria: 'RRHH', detalle: 'Contratación promotores de salud (Campaña Dengue)', monto: 800000, estado: 'DERIVADA', observaciones: 'Enviado a RRHH Central para autorización de cupo', estadoCompra: null, fecha: '2023-10-18' },
            { id: 11, efector: 'Hospital Norte', servicio: 'Maternidad', categoria: 'Bienes de capital', detalle: 'Incubadoras neonatales (x3)', monto: 4200000, estado: 'APROBADO', observaciones: 'Aprobación por resolución ministerial', estadoCompra: 'FINALIZADA', fecha: '2023-08-15' },
            { id: 12, efector: 'Hospital Sur', servicio: 'Clínica Médica', categoria: 'Bienes de capital', detalle: 'Camas ortopédicas eléctricas', monto: 2100000, estado: 'PRE_APROBADA', observaciones: 'Pendiente confirmar stock provincial', estadoCompra: null, fecha: '2023-10-19' },
            { id: 13, efector: 'Centro de Salud N°2', servicio: 'Enfermería', categoria: 'Insumos', detalle: 'Material descartable (Agujas, jeringas)', monto: 180000, estado: 'APROBADO', observaciones: '', estadoCompra: 'FINALIZADA', fecha: '2023-09-05' },
        ];

        const initialRendiciones = [
            { id: 1, fecha: '2023-09-25', categoria: 'Bienes de capital', tipoDoc: 'Factura B', numDoc: '0001-00004562', monto: 3500000, solicitudId: 5 },
            { id: 2, fecha: '2023-09-28', categoria: 'Insumos', tipoDoc: 'Factura A', numDoc: '0003-00012345', monto: 250000, solicitudId: null },
            { id: 3, fecha: '2023-10-02', categoria: 'Bienes de capital', tipoDoc: 'Factura C', numDoc: '0012-00000888', monto: 4200000, solicitudId: 11 },
            { id: 4, fecha: '2023-10-10', categoria: 'Insumos', tipoDoc: 'Factura A', numDoc: '0004-00055444', monto: 180000, solicitudId: 13 },
            { id: 5, fecha: '2023-10-15', categoria: 'Servicios', tipoDoc: 'Factura C', numDoc: '0001-00000122', monto: 45000, solicitudId: null },
            { id: 6, fecha: '2023-10-18', categoria: 'RRHH', tipoDoc: 'Recibo', numDoc: 'REC-2023-10-01', monto: 120000, solicitudId: null },
        ];

        const FONDO_ASIGNADO = 25000000;

        // --- MAIN APP COMPONENT ---
        function App() {
            const [role, setRole] = useState('EFECTOR'); // EFECTOR, UP, SCG
            const [currentTab, setCurrentTab] = useState('DASHBOARD');
            
            const [solicitudes, setSolicitudes] = useState(initialSolicitudes);
            const [rendiciones, setRendiciones] = useState(initialRendiciones);

            // Modal States
            const [isSolicitudModalOpen, setSolicitudModalOpen] = useState(false);
            const [isRendicionModalOpen, setRendicionModalOpen] = useState(false);
            
            // View States
            const [filtroEstado, setFiltroEstado] = useState('TODOS');
            const [isSidebarOpen, setSidebarOpen] = useState(false);
            const [scgTab, setScgTab] = useState('NUEVAS'); // NUEVAS, DERIVADAS, FINALIZADAS

            // Derived Data
            const totalRendido = rendiciones.reduce((acc, curr) => acc + curr.monto, 0);
            const saldoDisponible = FONDO_ASIGNADO - totalRendido;

            const formatCurrency = (amount) => {
                return new Intl.NumberFormat('es-AR', { style: 'currency', currency: 'ARS' }).format(amount);
            };

            // Handlers
            const handleRoleChange = (e) => {
                setRole(e.target.value);
                setFiltroEstado('TODOS'); 
                setScgTab('NUEVAS');
            };
            
            const cambiarEstadoSolicitud = (id, nuevoEstado) => {
                setSolicitudes(solicitudes.map(s => s.id === id ? { ...s, estado: nuevoEstado } : s));
            };

            const cambiarEstadoCompra = (id, nuevoEstadoCompra) => {
                setSolicitudes(solicitudes.map(s => s.id === id ? { ...s, estadoCompra: nuevoEstadoCompra } : s));
            };

            const agregarSolicitud = (nuevaSolicitud) => {
                setSolicitudes([{ ...nuevaSolicitud, id: Date.now(), estado: 'INICIADA', observaciones: '', estadoCompra: null, fecha: new Date().toISOString().split('T')[0] }, ...solicitudes]);
                setSolicitudModalOpen(false);
            };

            const agregarRendicion = (nuevaRendicion) => {
                setRendiciones([{ ...nuevaRendicion, id: Date.now(), fecha: new Date().toISOString().split('T')[0] }, ...rendiciones]);
                setRendicionModalOpen(false);
            };

            // Render Helpers
            const getEstadoBadge = (estado) => {
                switch(estado) {
                    case 'INICIADA': return <span className="px-2 py-1 text-xs font-semibold rounded-full bg-blue-100 text-blue-800 border border-blue-200">Iniciada</span>;
                    case 'PRE_APROBADA': return <span className="px-2 py-1 text-xs font-semibold rounded-full bg-yellow-100 text-yellow-800 border border-yellow-200">Pre-Aprobada (UP)</span>;
                    case 'DERIVADA': return <span className="px-2 py-1 text-xs font-semibold rounded-full bg-orange-100 text-orange-800 border border-orange-200">Derivada</span>;
                    case 'APROBADO': return <span className="px-2 py-1 text-xs font-semibold rounded-full bg-green-100 text-green-800 border border-green-200">Aprobado</span>;
                    case 'RECHAZADO': return <span className="px-2 py-1 text-xs font-semibold rounded-full bg-red-100 text-red-800 border border-red-200">Rechazado</span>;
                    default: return null;
                }
            };

            const getCompraBadge = (estadoCompra) => {
                if (!estadoCompra) return <span className="text-gray-400 text-sm italic">Pendiente</span>;
                if (estadoCompra === 'INICIADA_COMPRA') return <span className="px-2 py-1 text-xs font-semibold rounded-full bg-purple-100 text-purple-800">Compra Iniciada</span>;
                if (estadoCompra === 'FINALIZADA') return <span className="px-2 py-1 text-xs font-semibold rounded-full bg-emerald-100 text-emerald-800">Pagado y Finalizado</span>;
            };

            const solicitudesFiltradas = useMemo(() => {
                return solicitudes.filter(sol => {
                    if (filtroEstado === 'TODOS') return true;
                    return sol.estado === filtroEstado;
                });
            }, [solicitudes, filtroEstado]);

            const scgSolicitudes = useMemo(() => {
                if (scgTab === 'NUEVAS') return solicitudes.filter(s => s.estado === 'PRE_APROBADA');
                if (scgTab === 'DERIVADAS') return solicitudes.filter(s => s.estado === 'DERIVADA');
                if (scgTab === 'FINALIZADAS') return solicitudes.filter(s => s.estado === 'APROBADO' || s.estado === 'RECHAZADO');
                return [];
            }, [solicitudes, scgTab]);

            return (
                <div className="flex h-screen overflow-hidden bg-slate-50">
                    {/* Mobile Overlay */}
                    {isSidebarOpen && (
                        <div 
                            className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-30 md:hidden"
                            onClick={() => setSidebarOpen(false)}
                        ></div>
                    )}

                    {/* Sidebar */}
                    <aside className={`w-64 bg-primary text-white flex flex-col shadow-xl z-40 fixed md:static inset-y-0 left-0 transform transition-transform duration-300 ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full md:translate-x-0'}`}>
                        <div className="p-6 flex items-center justify-between border-b border-blue-800">
                            <div className="flex items-center gap-3">
                                <div className="bg-white p-2 rounded-lg text-primary shrink-0">
                                    <Icon name="activity" size={24} />
                                </div>
                                <h1 className="font-bold text-xl leading-tight">Sistema SUMAR</h1>
                            </div>
                            <button onClick={() => setSidebarOpen(false)} className="md:hidden text-blue-300 hover:text-white">
                                <Icon name="x" size={24} />
                            </button>
                        </div>
                        
                        <nav className="flex-1 py-6 px-4 space-y-2 overflow-y-auto">
                            <button 
                                onClick={() => { setCurrentTab('DASHBOARD'); setSidebarOpen(false); }}
                                className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200 ${currentTab === 'DASHBOARD' ? 'bg-blue-800 shadow-md translate-x-1' : 'hover:bg-blue-800/50 hover:translate-x-1'}`}
                            >
                                <Icon name="layout-dashboard" size={20} className={currentTab === 'DASHBOARD' ? 'text-blue-300' : 'text-blue-200'} />
                                <span className="font-medium">Estado de Cuenta</span>
                            </button>
                            <button 
                                onClick={() => { setCurrentTab('SOLICITUDES'); setSidebarOpen(false); }}
                                className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200 ${currentTab === 'SOLICITUDES' ? 'bg-blue-800 shadow-md translate-x-1' : 'hover:bg-blue-800/50 hover:translate-x-1'}`}
                            >
                                <Icon name="clipboard-list" size={20} className={currentTab === 'SOLICITUDES' ? 'text-blue-300' : 'text-blue-200'} />
                                <span className="font-medium">Autorizaciones</span>
                            </button>
                            <button 
                                onClick={() => { setCurrentTab('RENDICIONES'); setSidebarOpen(false); }}
                                className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200 ${currentTab === 'RENDICIONES' ? 'bg-blue-800 shadow-md translate-x-1' : 'hover:bg-blue-800/50 hover:translate-x-1'}`}
                            >
                                <Icon name="receipt" size={20} className={currentTab === 'RENDICIONES' ? 'text-blue-300' : 'text-blue-200'} />
                                <span className="font-medium">Rendiciones</span>
                            </button>
                        </nav>
                    </aside>

                    {/* Main Content */}
                    <main className="flex-1 flex flex-col h-screen overflow-hidden relative">
                        {/* Header */}
                        <header className="bg-white border-b border-slate-200 p-4 md:p-6 flex flex-col md:flex-row justify-between items-start md:items-center sticky top-0 z-10 shadow-sm gap-4">
                            <div className="flex items-center gap-3 w-full md:w-auto">
                                <button onClick={() => setSidebarOpen(true)} className="md:hidden p-1 text-slate-500 hover:text-slate-800 focus:outline-none">
                                    <Icon name="menu" size={24} />
                                </button>
                                <h2 className="text-xl md:text-2xl font-bold text-slate-800 truncate">
                                    {currentTab === 'DASHBOARD' && 'Dashboard General'}
                                    {currentTab === 'SOLICITUDES' && (role === 'SCG' ? 'Seguimiento SCG' : 'Gestión de Solicitudes')}
                                    {currentTab === 'RENDICIONES' && 'Rendiciones Mensuales'}
                                </h2>
                            </div>
                            
                            {/* Simulador de Rol (Compacto) */}
                            <div className="flex items-center gap-2 bg-slate-50 px-3 py-1.5 md:px-4 md:py-2 rounded-full border border-slate-200 w-full md:w-auto shadow-sm">
                                <div className={`w-2 h-2 rounded-full shrink-0 ${role === 'EFECTOR' ? 'bg-emerald-500' : role === 'UP' ? 'bg-blue-500' : 'bg-purple-500'}`}></div>
                                <span className="text-xs md:text-sm font-semibold text-slate-500 hidden sm:inline">Viendo como:</span>
                                <select 
                                    value={role} 
                                    onChange={handleRoleChange}
                                    className="bg-transparent text-primary font-bold text-xs md:text-sm outline-none cursor-pointer w-full"
                                >
                                    <option value="EFECTOR">Efector (Hospital)</option>
                                    <option value="UP">UP (Unidad Programa)</option>
                                    <option value="SCG">SCG (Secretaría APS)</option>
                                </select>
                            </div>
                        </header>

                        {/* Content Area - Scrollable */}
                        <div className="flex-1 overflow-y-auto p-4 md:p-8 max-w-7xl mx-auto w-full">
                            
                            {/* TAB: DASHBOARD */}
                            {currentTab === 'DASHBOARD' && (
                                <div className="space-y-6 md:space-y-8 animate-in fade-in slide-in-from-bottom-4 duration-500">
                                    {/* Cards */}
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4 md:gap-6">
                                        <div className="bg-white rounded-2xl p-6 border border-slate-200 shadow-sm flex items-center gap-4 relative overflow-hidden group">
                                            <div className="absolute top-0 right-0 p-4 opacity-5 group-hover:scale-110 transition-transform duration-500">
                                                <Icon name="wallet" size={80} />
                                            </div>
                                            <div className="bg-blue-100 p-4 rounded-xl text-blue-600 shrink-0">
                                                <Icon name="wallet" size={28} />
                                            </div>
                                            <div className="min-w-0">
                                                <p className="text-sm font-medium text-slate-500 truncate">Fondo Asignado Total</p>
                                                <h3 className="text-2xl font-bold text-slate-800 truncate">{formatCurrency(FONDO_ASIGNADO)}</h3>
                                            </div>
                                        </div>
                                        
                                        <div className="bg-white rounded-2xl p-6 border border-slate-200 shadow-sm flex items-center gap-4 relative overflow-hidden group">
                                            <div className="absolute top-0 right-0 p-4 opacity-5 group-hover:scale-110 transition-transform duration-500">
                                                <Icon name="receipt-text" size={80} />
                                            </div>
                                            <div className="bg-orange-100 p-4 rounded-xl text-orange-600 shrink-0">
                                                <Icon name="receipt-text" size={28} />
                                            </div>
                                            <div className="min-w-0">
                                                <p className="text-sm font-medium text-slate-500 truncate">Total Rendido</p>
                                                <h3 className="text-2xl font-bold text-slate-800 truncate">{formatCurrency(totalRendido)}</h3>
                                            </div>
                                        </div>

                                        <div className="bg-gradient-to-br from-primary to-primaryLight rounded-2xl p-6 border border-blue-600 shadow-lg flex items-center gap-4 text-white relative overflow-hidden group">
                                            <div className="absolute top-0 right-0 p-4 opacity-10 group-hover:scale-110 transition-transform duration-500">
                                                <Icon name="piggy-bank" size={80} />
                                            </div>
                                            <div className="bg-white/20 p-4 rounded-xl backdrop-blur-sm shrink-0">
                                                <Icon name="piggy-bank" size={28} />
                                            </div>
                                            <div className="min-w-0">
                                                <p className="text-sm font-medium text-blue-100 truncate">Saldo Disponible</p>
                                                <h3 className="text-2xl md:text-3xl font-bold truncate">{formatCurrency(saldoDisponible)}</h3>
                                            </div>
                                        </div>
                                    </div>

                                    {/* Action Banner */}
                                    {role === 'EFECTOR' && (
                                        <div className="bg-white rounded-2xl p-6 md:p-8 border border-slate-200 shadow-sm flex flex-col lg:flex-row items-center justify-between gap-6 text-center lg:text-left">
                                            <div>
                                                <h3 className="text-xl font-bold text-slate-800 mb-2">¿Necesitas realizar un nuevo gasto?</h3>
                                                <p className="text-slate-500 max-w-2xl">Inicia una nueva solicitud de autorización para bienes de capital, insumos, servicios o recursos humanos. El requerimiento pasará por el proceso de revisión de UP y SCG.</p>
                                            </div>
                                            <button 
                                                onClick={() => { setCurrentTab('SOLICITUDES'); }}
                                                className="bg-primary hover:bg-blue-800 text-white px-6 py-4 rounded-xl font-semibold shadow-md shadow-blue-900/20 transition-all hover:-translate-y-1 flex items-center justify-center gap-2 w-full lg:w-auto"
                                            >
                                                <Icon name="plus-circle" size={20} />
                                                Nueva Solicitud
                                            </button>
                                        </div>
                                    )}
                                </div>
                            )}

                            {/* TAB: SOLICITUDES */}
                            {currentTab === 'SOLICITUDES' && (
                                <div className="animate-in fade-in slide-in-from-bottom-4 duration-500 h-full flex flex-col">
                                    
                                    {/* Vista Efector / UP */}
                                    {role !== 'SCG' && (
                                        <>
                                            <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-6">
                                                <div className="flex flex-col sm:flex-row items-start sm:items-center gap-2 sm:gap-3 w-full md:w-auto">
                                                    <label className="text-sm font-medium text-slate-600">Filtrar:</label>
                                                    <select 
                                                        value={filtroEstado}
                                                        onChange={(e) => setFiltroEstado(e.target.value)}
                                                        className="bg-white border border-slate-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-primary outline-none shadow-sm w-full sm:w-auto"
                                                    >
                                                        <option value="TODOS">Todos los estados</option>
                                                        <option value="INICIADA">Iniciada</option>
                                                        <option value="PRE_APROBADA">Pre-Aprobada</option>
                                                        <option value="DERIVADA">Derivada</option>
                                                        <option value="APROBADO">Aprobada</option>
                                                        <option value="RECHAZADO">Rechazada</option>
                                                    </select>
                                                </div>
                                                {role === 'EFECTOR' && (
                                                    <button 
                                                        onClick={() => setSolicitudModalOpen(true)}
                                                        className="bg-primary hover:bg-blue-800 text-white px-4 py-2 rounded-lg font-medium shadow transition-colors flex items-center justify-center gap-2 w-full md:w-auto"
                                                    >
                                                        <Icon name="plus" size={18} />
                                                        Nueva Solicitud
                                                    </button>
                                                )}
                                            </div>

                                            <div className="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden flex-1">
                                                <div className="overflow-x-auto w-full">
                                                    <table className="w-full text-left text-sm whitespace-normal min-w-[800px]">
                                                        <thead className="bg-slate-50 border-b border-slate-200 text-slate-600 uppercase text-xs font-semibold">
                                                            <tr>
                                                                <th className="px-6 py-4 w-24">ID/Fecha</th>
                                                                <th className="px-6 py-4 w-1/4">Detalle / Servicio</th>
                                                                <th className="px-6 py-4">Monto</th>
                                                                <th className="px-6 py-4 w-1/4">Observaciones</th>
                                                                <th className="px-6 py-4">Estado Revisión</th>
                                                                <th className="px-6 py-4">Estado Compra</th>
                                                                <th className="px-6 py-4 text-right">Acciones</th>
                                                            </tr>
                                                        </thead>
                                                        <tbody className="divide-y divide-slate-100 text-slate-700">
                                                            {solicitudesFiltradas.map(sol => (
                                                                <tr key={sol.id} className="hover:bg-slate-50 transition-colors group">
                                                                    <td className="px-6 py-4 align-top">
                                                                        <div className="font-medium text-slate-900">REQ-{sol.id.toString().padStart(4, '0')}</div>
                                                                        <div className="text-xs text-slate-500">{sol.fecha}</div>
                                                                    </td>
                                                                    <td className="px-6 py-4 align-top">
                                                                        <div className="font-semibold text-slate-800">{sol.detalle}</div>
                                                                        <div className="text-slate-500 text-xs mt-1">
                                                                            <span className="bg-slate-100 text-slate-600 px-1.5 py-0.5 rounded text-[10px] uppercase tracking-wider mr-1">{sol.categoria}</span>
                                                                            {role === 'UP' ? sol.efector + ' • ' : ''}{sol.servicio}
                                                                        </div>
                                                                    </td>
                                                                    <td className="px-6 py-4 font-bold text-slate-800 align-top">
                                                                        {formatCurrency(sol.monto)}
                                                                    </td>
                                                                    <td className="px-6 py-4 text-xs text-slate-600 align-top">
                                                                        {sol.observaciones || <span className="text-slate-400 italic">Sin observaciones</span>}
                                                                    </td>
                                                                    <td className="px-6 py-4 align-top">
                                                                        {getEstadoBadge(sol.estado)}
                                                                    </td>
                                                                    <td className="px-6 py-4 align-top">
                                                                        {getCompraBadge(sol.estadoCompra)}
                                                                    </td>
                                                                    <td className="px-6 py-4 text-right align-top space-y-2">
                                                                        {role === 'UP' && sol.estado === 'INICIADA' && (
                                                                            <div className="flex flex-col gap-2 items-end">
                                                                                <button onClick={() => cambiarEstadoSolicitud(sol.id, 'PRE_APROBADA')} className="bg-yellow-100 hover:bg-yellow-200 text-yellow-800 px-3 py-1.5 rounded-md text-xs font-semibold transition-colors w-full text-center">Pre-Aprobar</button>
                                                                                <button onClick={() => cambiarEstadoSolicitud(sol.id, 'RECHAZADO')} className="bg-red-100 hover:bg-red-200 text-red-700 px-3 py-1.5 rounded-md text-xs font-semibold transition-colors w-full text-center">Rechazar</button>
                                                                            </div>
                                                                        )}
                                                                        {role === 'EFECTOR' && sol.estado === 'APROBADO' && (
                                                                            <select 
                                                                                value={sol.estadoCompra || ''} 
                                                                                onChange={(e) => cambiarEstadoCompra(sol.id, e.target.value)}
                                                                                className="border border-slate-300 rounded-md text-xs p-1.5 bg-white focus:ring-1 focus:ring-primary outline-none w-full"
                                                                            >
                                                                                <option value="" disabled>Estado Compra...</option>
                                                                                <option value="INICIADA_COMPRA">Iniciar Compra</option>
                                                                                <option value="FINALIZADA">Pagado y Finalizado</option>
                                                                            </select>
                                                                        )}
                                                                        {((role === 'UP' && sol.estado !== 'INICIADA') || (role === 'EFECTOR' && sol.estado !== 'APROBADO')) && (
                                                                            <span className="text-slate-400 text-xs italic block">-</span>
                                                                        )}
                                                                    </td>
                                                                </tr>
                                                            ))}
                                                            {solicitudesFiltradas.length === 0 && (
                                                                <tr>
                                                                    <td colSpan="7" className="px-6 py-12 text-center text-slate-500">
                                                                        No se encontraron solicitudes que coincidan con el filtro.
                                                                    </td>
                                                                </tr>
                                                            )}
                                                        </tbody>
                                                    </table>
                                                </div>
                                            </div>
                                        </>
                                    )}

                                    {/* Vista SCG (Sub-tabs) */}
                                    {role === 'SCG' && (
                                        <div className="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden flex-1 flex flex-col">
                                            {/* Sub-Tabs Header */}
                                            <div className="flex border-b border-slate-200 overflow-x-auto bg-slate-50 scrollbar-hide">
                                                <button 
                                                    onClick={() => setScgTab('NUEVAS')}
                                                    className={`flex items-center gap-2 px-4 md:px-6 py-3 md:py-4 font-semibold text-sm transition-colors border-b-2 whitespace-nowrap outline-none ${scgTab === 'NUEVAS' ? 'border-primary text-primary bg-white' : 'border-transparent text-slate-500 hover:text-slate-700 hover:bg-slate-100'}`}
                                                >
                                                    Nuevas Solicitudes
                                                    <span className={`py-0.5 px-2 rounded-full text-xs transition-colors ${scgTab === 'NUEVAS' ? 'bg-blue-100 text-blue-700' : 'bg-slate-200 text-slate-600'}`}>
                                                        {solicitudes.filter(s => s.estado === 'PRE_APROBADA').length}
                                                    </span>
                                                </button>
                                                <button 
                                                    onClick={() => setScgTab('DERIVADAS')}
                                                    className={`flex items-center gap-2 px-4 md:px-6 py-3 md:py-4 font-semibold text-sm transition-colors border-b-2 whitespace-nowrap outline-none ${scgTab === 'DERIVADAS' ? 'border-orange-500 text-orange-600 bg-white' : 'border-transparent text-slate-500 hover:text-slate-700 hover:bg-slate-100'}`}
                                                >
                                                    Derivaciones
                                                    <span className={`py-0.5 px-2 rounded-full text-xs transition-colors ${scgTab === 'DERIVADAS' ? 'bg-orange-100 text-orange-700' : 'bg-slate-200 text-slate-600'}`}>
                                                        {solicitudes.filter(s => s.estado === 'DERIVADA').length}
                                                    </span>
                                                </button>
                                                <button 
                                                    onClick={() => setScgTab('FINALIZADAS')}
                                                    className={`flex items-center gap-2 px-4 md:px-6 py-3 md:py-4 font-semibold text-sm transition-colors border-b-2 whitespace-nowrap outline-none ${scgTab === 'FINALIZADAS' ? 'border-emerald-500 text-emerald-600 bg-white' : 'border-transparent text-slate-500 hover:text-slate-700 hover:bg-slate-100'}`}
                                                >
                                                    Finalizadas
                                                </button>
                                            </div>

                                            {/* Sub-Tabs Content (Table) */}
                                            <div className="overflow-x-auto flex-1">
                                                <table className="w-full text-left text-sm whitespace-normal min-w-[800px]">
                                                    <thead className="bg-white border-b border-slate-100 text-slate-500 uppercase text-xs font-semibold">
                                                        <tr>
                                                            <th className="px-6 py-4 w-24">ID/Fecha</th>
                                                            <th className="px-6 py-4">Efector / Detalle</th>
                                                            <th className="px-6 py-4">Monto</th>
                                                            <th className="px-6 py-4 w-1/4">Observaciones</th>
                                                            <th className="px-6 py-4 text-right">Acciones</th>
                                                        </tr>
                                                    </thead>
                                                    <tbody className="divide-y divide-slate-100 text-slate-700">
                                                        {scgSolicitudes.map(sol => (
                                                            <tr key={sol.id} className="hover:bg-slate-50 transition-colors">
                                                                <td className="px-6 py-4 align-top">
                                                                    <div className="font-medium text-slate-900">REQ-{sol.id.toString().padStart(4, '0')}</div>
                                                                    <div className="text-xs text-slate-500">{sol.fecha}</div>
                                                                </td>
                                                                <td className="px-6 py-4 align-top">
                                                                    <div className="font-bold text-slate-800">{sol.efector}</div>
                                                                    <div className="font-semibold text-slate-700 mt-1">{sol.detalle}</div>
                                                                    <div className="text-slate-500 text-xs mt-0.5">{sol.servicio}</div>
                                                                </td>
                                                                <td className="px-6 py-4 font-bold text-slate-800 align-top">
                                                                    {formatCurrency(sol.monto)}
                                                                </td>
                                                                <td className="px-6 py-4 text-xs text-slate-600 align-top">
                                                                    {sol.observaciones || <span className="text-slate-400 italic">Sin observaciones previas</span>}
                                                                </td>
                                                                <td className="px-6 py-4 text-right align-top">
                                                                    {scgTab === 'NUEVAS' && (
                                                                        <div className="flex justify-end gap-2">
                                                                            <button onClick={() => cambiarEstadoSolicitud(sol.id, 'APROBADO')} className="bg-emerald-100 hover:bg-emerald-200 text-emerald-800 px-3 py-1.5 rounded-md text-xs font-semibold transition-colors shadow-sm">Aprobar</button>
                                                                            <button onClick={() => cambiarEstadoSolicitud(sol.id, 'DERIVADA')} className="bg-orange-100 hover:bg-orange-200 text-orange-800 px-3 py-1.5 rounded-md text-xs font-semibold transition-colors shadow-sm">Derivar</button>
                                                                            <button onClick={() => cambiarEstadoSolicitud(sol.id, 'RECHAZADO')} className="bg-red-100 hover:bg-red-200 text-red-700 px-3 py-1.5 rounded-md text-xs font-semibold transition-colors shadow-sm">Rechazar</button>
                                                                        </div>
                                                                    )}
                                                                    {scgTab === 'DERIVADAS' && (
                                                                        <div className="flex justify-end gap-2">
                                                                            <button onClick={() => cambiarEstadoSolicitud(sol.id, 'APROBADO')} className="border border-emerald-300 hover:bg-emerald-50 text-emerald-700 px-3 py-1.5 rounded-md text-xs font-semibold transition-colors shadow-sm">Aprobar (Post-Derivación)</button>
                                                                        </div>
                                                                    )}
                                                                    {scgTab === 'FINALIZADAS' && (
                                                                        <div>{getEstadoBadge(sol.estado)}</div>
                                                                    )}
                                                                </td>
                                                            </tr>
                                                        ))}
                                                        {scgSolicitudes.length === 0 && (
                                                            <tr>
                                                                <td colSpan="5" className="px-6 py-16 text-center">
                                                                    <Icon name={scgTab === 'NUEVAS' ? 'inbox' : scgTab === 'DERIVADAS' ? 'arrow-right-left' : 'check-circle-2'} size={48} className="mx-auto text-slate-300 mb-4" />
                                                                    <p className="text-slate-500 font-medium">No hay solicitudes en esta sección.</p>
                                                                </td>
                                                            </tr>
                                                        )}
                                                    </tbody>
                                                </table>
                                            </div>
                                        </div>
                                    )}

                                </div>
                            )}

                            {/* TAB: RENDICIONES */}
                            {currentTab === 'RENDICIONES' && (
                                <div className="space-y-6 animate-in fade-in slide-in-from-bottom-4 duration-500">
                                     <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                                        <div>
                                            <p className="text-slate-500 text-sm md:text-base">Registro de comprobantes de gastos ejecutados.</p>
                                            <p className="text-sm font-semibold text-primary mt-1">Saldo a Rendir disponible: {formatCurrency(saldoDisponible)}</p>
                                        </div>
                                        {role === 'EFECTOR' && (
                                            <button 
                                                onClick={() => setRendicionModalOpen(true)}
                                                className="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-lg font-medium shadow transition-colors flex items-center justify-center gap-2 w-full md:w-auto"
                                            >
                                                <Icon name="receipt" size={18} />
                                                Nueva Rendición
                                            </button>
                                        )}
                                    </div>

                                    <div className="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
                                        <div className="overflow-x-auto w-full">
                                            <table className="w-full text-left text-sm whitespace-nowrap min-w-[700px]">
                                                <thead className="bg-slate-50 border-b border-slate-200 text-slate-600 uppercase text-xs font-semibold">
                                                    <tr>
                                                        <th className="px-4 md:px-6 py-4">Fecha</th>
                                                        <th className="px-4 md:px-6 py-4">Categoría</th>
                                                        <th className="px-4 md:px-6 py-4">Documento</th>
                                                        <th className="px-4 md:px-6 py-4">Nº Comprobante</th>
                                                        <th className="px-4 md:px-6 py-4">Ref. Solicitud</th>
                                                        <th className="px-4 md:px-6 py-4 text-right">Monto Rendido</th>
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y divide-slate-100 text-slate-700">
                                                    {rendiciones.map(ren => (
                                                        <tr key={ren.id} className="hover:bg-slate-50 transition-colors group">
                                                            <td className="px-4 md:px-6 py-4">{ren.fecha}</td>
                                                            <td className="px-4 md:px-6 py-4">
                                                                <span className="bg-slate-100 text-slate-600 px-2 py-1 rounded-md text-xs font-medium">{ren.categoria}</span>
                                                            </td>
                                                            <td className="px-4 md:px-6 py-4 font-medium">{ren.tipoDoc}</td>
                                                            <td className="px-4 md:px-6 py-4 text-slate-500 font-mono">{ren.numDoc}</td>
                                                            <td className="px-4 md:px-6 py-4 text-slate-500">
                                                                {ren.solicitudId ? `REQ-${ren.solicitudId.toString().padStart(4, '0')}` : 'Sin ref.'}
                                                            </td>
                                                            <td className="px-4 md:px-6 py-4 text-right font-bold text-slate-800">
                                                                {formatCurrency(ren.monto)}
                                                            </td>
                                                        </tr>
                                                    ))}
                                                    {rendiciones.length === 0 && (
                                                        <tr>
                                                            <td colSpan="6" className="px-6 py-12 text-center text-slate-500">
                                                                No hay rendiciones registradas.
                                                            </td>
                                                        </tr>
                                                    )}
                                                </tbody>
                                                <tfoot className="bg-slate-50 border-t border-slate-200">
                                                    <tr>
                                                        <td colSpan="5" className="px-4 md:px-6 py-4 text-right font-bold text-slate-700 uppercase text-xs">Total Rendido</td>
                                                        <td className="px-4 md:px-6 py-4 text-right font-bold text-lg text-primary">{formatCurrency(totalRendido)}</td>
                                                    </tr>
                                                </tfoot>
                                            </table>
                                        </div>
                                    </div>
                                </div>
                            )}

                        </div>
                    </main>

                    {/* MODAL: NUEVA SOLICITUD */}
                    {isSolicitudModalOpen && (
                        <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center p-4 animate-in fade-in duration-200">
                            <div className="bg-white rounded-2xl shadow-xl w-full max-w-lg overflow-hidden flex flex-col max-h-[90vh]">
                                <div className="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                                    <h3 className="font-bold text-lg text-slate-800 flex items-center gap-2">
                                        <Icon name="file-plus-2" size={20} className="text-primary" />
                                        Nueva Solicitud
                                    </h3>
                                    <button onClick={() => setSolicitudModalOpen(false)} className="text-slate-400 hover:text-slate-600">
                                        <Icon name="x" size={24} />
                                    </button>
                                </div>
                                <div className="p-6 overflow-y-auto flex-1">
                                    <form id="form-solicitud" className="space-y-4" onSubmit={(e) => {
                                        e.preventDefault();
                                        const fd = new FormData(e.target);
                                        agregarSolicitud({
                                            efector: 'Hospital Central',
                                            servicio: fd.get('servicio'),
                                            categoria: fd.get('categoria'),
                                            detalle: fd.get('detalle'),
                                            monto: parseFloat(fd.get('monto'))
                                        });
                                    }}>
                                        <div>
                                            <label className="block text-sm font-medium text-slate-700 mb-1">Servicio / Área</label>
                                            <input required name="servicio" type="text" placeholder="Ej. Cardiología..." className="w-full border border-slate-300 rounded-lg p-2.5 focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none transition-all" />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-slate-700 mb-1">Categoría del Gasto</label>
                                            <select required name="categoria" className="w-full border border-slate-300 rounded-lg p-2.5 focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none transition-all bg-white">
                                                <option value="">Seleccione categoría...</option>
                                                <option value="Bienes de capital">Bienes de capital</option>
                                                <option value="Insumos">Insumos</option>
                                                <option value="Servicios">Servicios</option>
                                                <option value="RRHH">Recursos Humanos</option>
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-slate-700 mb-1">Detalle / Justificación</label>
                                            <textarea required name="detalle" rows="3" placeholder="Describa el gasto..." className="w-full border border-slate-300 rounded-lg p-2.5 focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none transition-all"></textarea>
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-slate-700 mb-1">Monto Estimado ($ ARS)</label>
                                            <input required name="monto" type="number" min="1" step="0.01" placeholder="0.00" className="w-full border border-slate-300 rounded-lg p-2.5 focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none transition-all" />
                                        </div>
                                    </form>
                                </div>
                                <div className="px-6 py-4 border-t border-slate-100 bg-slate-50 flex justify-end gap-3">
                                    <button type="button" onClick={() => setSolicitudModalOpen(false)} className="px-4 py-2 text-slate-600 font-medium hover:bg-slate-200 rounded-lg transition-colors">Cancelar</button>
                                    <button type="submit" form="form-solicitud" className="px-4 py-2 bg-primary hover:bg-blue-800 text-white font-medium rounded-lg shadow-sm transition-colors">Crear</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL: NUEVA RENDICION */}
                    {isRendicionModalOpen && (
                        <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center p-4 animate-in fade-in duration-200">
                            <div className="bg-white rounded-2xl shadow-xl w-full max-w-lg overflow-hidden flex flex-col max-h-[90vh]">
                                <div className="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                                    <h3 className="font-bold text-lg text-slate-800 flex items-center gap-2">
                                        <Icon name="receipt" size={20} className="text-emerald-600" />
                                        Nueva Rendición
                                    </h3>
                                    <button onClick={() => setRendicionModalOpen(false)} className="text-slate-400 hover:text-slate-600">
                                        <Icon name="x" size={24} />
                                    </button>
                                </div>
                                <div className="p-6 overflow-y-auto flex-1">
                                    <div className="bg-blue-50 text-blue-800 text-sm p-3 rounded-lg border border-blue-100 mb-4 flex gap-2">
                                        <Icon name="info" size={16} className="mt-0.5 flex-shrink-0" />
                                        <p>Saldo disponible: <strong>{formatCurrency(saldoDisponible)}</strong></p>
                                    </div>
                                    <form id="form-rendicion" className="space-y-4" onSubmit={(e) => {
                                        e.preventDefault();
                                        const fd = new FormData(e.target);
                                        const monto = parseFloat(fd.get('monto'));
                                        if (monto > saldoDisponible) {
                                            alert("El monto supera el saldo disponible.");
                                            return;
                                        }
                                        agregarRendicion({
                                            categoria: fd.get('categoria'),
                                            tipoDoc: fd.get('tipoDoc'),
                                            numDoc: fd.get('numDoc'),
                                            monto: monto,
                                            solicitudId: fd.get('solicitudId') ? parseInt(fd.get('solicitudId')) : null
                                        });
                                    }}>
                                        <div>
                                            <label className="block text-sm font-medium text-slate-700 mb-1">Referencia a Solicitud</label>
                                            <select name="solicitudId" className="w-full border border-slate-300 rounded-lg p-2.5 focus:ring-2 focus:ring-emerald-500/50 focus:border-emerald-500 outline-none transition-all bg-white text-sm">
                                                <option value="">Sin referencia (Gasto directo)</option>
                                                {solicitudes.filter(s => s.estadoCompra === 'INICIADA_COMPRA' || s.estadoCompra === 'FINALIZADA').map(s => (
                                                    <option key={s.id} value={s.id}>REQ-{s.id.toString().padStart(4,'0')} - {s.detalle} ({formatCurrency(s.monto)})</option>
                                                ))}
                                            </select>
                                        </div>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                            <div>
                                                <label className="block text-sm font-medium text-slate-700 mb-1">Categoría</label>
                                                <select required name="categoria" className="w-full border border-slate-300 rounded-lg p-2.5 focus:ring-2 focus:ring-emerald-500/50 focus:border-emerald-500 outline-none transition-all bg-white">
                                                    <option value="Bienes de capital">Bienes de capital</option>
                                                    <option value="Insumos">Insumos</option>
                                                    <option value="Servicios">Servicios</option>
                                                    <option value="RRHH">RRHH</option>
                                                </select>
                                            </div>
                                            <div>
                                                <label className="block text-sm font-medium text-slate-700 mb-1">Documento</label>
                                                <select required name="tipoDoc" className="w-full border border-slate-300 rounded-lg p-2.5 focus:ring-2 focus:ring-emerald-500/50 focus:border-emerald-500 outline-none transition-all bg-white">
                                                    <option value="Factura A">Factura A</option>
                                                    <option value="Factura B">Factura B</option>
                                                    <option value="Factura C">Factura C</option>
                                                    <option value="Expediente">Expediente Admin.</option>
                                                    <option value="Recibo">Recibo</option>
                                                </select>
                                            </div>
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-slate-700 mb-1">Nº Comprobante</label>
                                            <input required name="numDoc" type="text" placeholder="Ej. 0001-00001234" className="w-full border border-slate-300 rounded-lg p-2.5 focus:ring-2 focus:ring-emerald-500/50 focus:border-emerald-500 outline-none transition-all" />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-slate-700 mb-1">Monto Rendido ($ ARS)</label>
                                            <input required name="monto" type="number" min="1" step="0.01" max={saldoDisponible} placeholder="0.00" className="w-full border border-slate-300 rounded-lg p-2.5 focus:ring-2 focus:ring-emerald-500/50 focus:border-emerald-500 outline-none transition-all" />
                                        </div>
                                    </form>
                                </div>
                                <div className="px-6 py-4 border-t border-slate-100 bg-slate-50 flex justify-end gap-3">
                                    <button type="button" onClick={() => setRendicionModalOpen(false)} className="px-4 py-2 text-slate-600 font-medium hover:bg-slate-200 rounded-lg transition-colors">Cancelar</button>
                                    <button type="submit" form="form-rendicion" className="px-4 py-2 bg-emerald-600 hover:bg-emerald-700 text-white font-medium rounded-lg shadow-sm transition-colors">Cargar Rendición</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
